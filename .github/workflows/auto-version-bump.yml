name: auto-version-bump

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: auto-version-bump-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bump:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bump patch version
        id: bump
        run: npm version patch --no-git-tag-version

      - name: Commit and push version files
        id: commit
        run: |
          if git diff --quiet package.json package-lock.json; then
            echo "No version file changes detected"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          VERSION=$(node -e "console.log(require('./package.json').version)")
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${VERSION}"
          git push origin HEAD:main
          echo "pushed=true" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Trigger release workflow
        if: steps.commit.outputs.pushed == 'true'
        run: gh workflow run release.yml --ref main
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Trigger npm publish workflow
        if: steps.commit.outputs.pushed == 'true'
        run: gh workflow run npm-publish.yml --ref main
        env:
          GH_TOKEN: ${{ github.token }}
